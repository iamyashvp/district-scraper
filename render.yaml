services:
  # ── Web Service: API + Frontend Dashboard ──
  - type: web
    name: district-scraper
    runtime: node
    repo: https://github.com/iamyashvp/district-scraper
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: node server.js
    healthCheckPath: /api/cities
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: REDIS_HOST
        fromService:
          type: redis
          name: district-queue
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: district-queue
          property: port
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false

  # ── Background Worker: Playwright Scraper ──
  - type: worker
    name: district-scraper-worker
    runtime: docker
    repo: https://github.com/iamyashvp/district-scraper
    plan: starter
    dockerfilePath: ./worker/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: REDIS_HOST
        fromService:
          type: redis
          name: district-queue
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: district-queue
          property: port
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: TARGET_URL
        value: https://www.district.in

  # ── Redis: Job Queue ──
  - type: redis
    name: district-queue
    plan: free
    maxmemoryPolicy: noeviction
